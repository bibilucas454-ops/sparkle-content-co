
[functions.oauth-callback]
verify_jwt = false

[functions.publish-video]
verify_jwt = false

[functions.refresh-token]
verify_jwt = false

[functions.cron-scheduler]
enabled = true
verify_jwt = true
import_map = "./functions/cron-scheduler/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/cron-scheduler/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/cron-scheduler/*.html" ]

[functions.generate-content]
verify_jwt = true
